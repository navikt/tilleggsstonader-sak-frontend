# This workflow is triggered by GitHub Copilot to set up
# the environment for the coding agent.
# https://docs.github.com/en/copilot/customizing-copilot/customizing-the-development-environment-for-copilot-coding-agent

name: Copilot Setup Steps

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: yarn
          cache-dependency-path: |
            yarn.lock
            src/backend/yarn.lock

      - name: Enable Yarn Classic
        run: corepack enable && corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        run: yarn ci
